services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - cloudverse-network

  backend:
    build: ./backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_PATH=/app/data/cloudverse.db
    volumes:
      - ./backend/data:/app/data
    networks:
      - cloudverse-network

  frontend:
    build: ./cloudverse-frontend
    networks:
      - cloudverse-network

networks:
  cloudverse-network:
    driver: bridge
