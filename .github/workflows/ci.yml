name: CloudVerse CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ----------------------
      # Backend Build
      # ----------------------
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Test Backend
        run: |
          cd backend
          node server.js &
          sleep 5
          curl http://localhost:5000/health

      # ----------------------
      # Frontend Build
      # ----------------------
      - name: Install Frontend Dependencies
        run: |
          cd cloudverse-frontend
          npm install

      - name: Build Frontend
        run: |
          cd cloudverse-frontend
          npm run build

      # ----------------------
      # Docker Build
      # ----------------------
      - name: Build Docker Images
        run: |
          docker compose build.
          